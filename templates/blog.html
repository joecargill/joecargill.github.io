{% extends "index.html" %}

{% block content %}
<div class="posts">
    {% for post in section.pages | reverse %}
        <div class="post">
            <h1 class="post-title">
                <a href="{{ post.permalink }}">
                    {{ post.title }}
                </a>
            </h1>
            <span class="post-date">{{ post.date | date(format="%Y-%m-%d") }}</span>
        </div>
    {% endfor %}
</div>
{% endblock content %}
