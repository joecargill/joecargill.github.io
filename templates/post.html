{% extends "base.html" %}


{% block layout %}
<div class="blog-content container">
  <div class="post">
    <h1 class="post-title">{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date(format="%Y-%m-%d") }}</span>
    {{ page.content | safe }}
  </div>
</div>
{% endblock layout %}
